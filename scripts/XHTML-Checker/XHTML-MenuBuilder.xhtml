<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Builder - PwShGUI</title>
  <style type="text/css">
    :root{
      --bg:#1e1e1e;--bg-alt:#2d2d30;--panel:#252526;--control:#333337;
      --accent:#007acc;--pass:#4ec9b0;--warn:#dcdcaa;--fail:#f44747;
      --fg:#d4d4d4;--fg-sub:#969696;--border:#3f3f46;
      --btn:#37373c;--btn-hover:#46464e;--radius:5px;--gap:10px;--pad:14px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Tahoma,sans-serif;font-size:13px;
         background:var(--bg);color:var(--fg);height:100vh;
         display:flex;flex-direction:column;overflow:hidden}
    /* ── Header ── */
    .hdr{background:var(--accent);color:#fff;padding:8px var(--pad);
         display:flex;align-items:center;gap:var(--gap);font-size:15px;font-weight:600;flex-shrink:0}
    .hdr .ver{font-size:11px;opacity:.7;margin-left:auto}
    .hdr .hdr-btn{font-size:12px;padding:4px 10px;border:none;border-radius:var(--radius);
                  cursor:pointer;font-family:inherit}
    .hdr-btn.imp{background:#2a5a7a;color:#fff}
    .hdr-btn.imp:hover{background:#2f6a8a}
    .hdr-btn.exp{background:#1f7a4f;color:#fff}
    .hdr-btn.exp:hover{background:#248a5a}
    /* ── 3-column layout ── */
    .workspace{display:flex;flex:1;overflow:hidden;gap:2px;background:var(--border)}
    .col{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
    .col-list{width:260px;min-width:220px;flex-shrink:0}
    .col-props{flex:1;min-width:280px}
    .col-preview{width:320px;min-width:280px;flex-shrink:0}
    .col-hdr{background:var(--panel);color:var(--warn);font-size:11px;font-weight:600;
             letter-spacing:.06em;padding:6px var(--pad);border-bottom:1px solid var(--border);flex-shrink:0}
    /* ── Item list ── */
    .item-list{flex:1;overflow-y:auto;padding:6px}
    .item-row{display:flex;align-items:center;gap:6px;padding:6px 8px;
              border-radius:var(--radius);border:1px solid transparent;cursor:pointer;
              user-select:none;margin-bottom:3px}
    .item-row:hover{background:var(--control);border-color:var(--border)}
    .item-row.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
    .item-row.dragging{opacity:.4}
    .item-row.drag-over{border-top:2px solid var(--pass)}
    .drag-handle{cursor:grab;opacity:.5;font-size:14px;flex-shrink:0}
    .item-row.selected .drag-handle{opacity:.8}
    .item-icon{font-size:15px;flex-shrink:0}
    .item-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .item-vis{font-size:10px;opacity:.6}
    .list-actions{display:flex;gap:4px;padding:6px;border-top:1px solid var(--border);flex-shrink:0}
    .la-btn{flex:1;padding:5px;border:1px solid var(--border);border-radius:var(--radius);
            background:var(--btn);color:var(--fg);cursor:pointer;font-size:11px;font-family:inherit}
    .la-btn:hover{background:var(--btn-hover)}
    .la-btn.danger{border-color:var(--fail);color:var(--fail)}
    .la-btn.danger:hover{background:rgba(244,71,71,.15)}
    /* ── Props panel ── */
    .props-body{flex:1;overflow-y:auto;padding:var(--pad)}
    .prop-group{margin-bottom:12px}
    .prop-label{font-size:11px;color:var(--fg-sub);margin-bottom:4px;display:block}
    .prop-input{width:100%;padding:7px 9px;background:var(--control);color:var(--fg);
                border:1px solid var(--border);border-radius:var(--radius);
                font-family:inherit;font-size:13px}
    .prop-input:focus{outline:none;border-color:var(--accent)}
    .prop-row{display:flex;gap:var(--gap)}
    .prop-row .prop-group{flex:1}
    select.prop-input option{background:var(--control);color:var(--fg)}
    .prop-check-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .prop-check-row label{font-size:12px}
    .swatch-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
    .swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;
            border:2px solid transparent;flex-shrink:0}
    .swatch:hover,.swatch.active{border-color:#fff}
    .props-placeholder{display:flex;align-items:center;justify-content:center;
                       flex:1;color:var(--fg-sub);font-size:12px;text-align:center;padding:20px}
    /* ── JSON Preview ── */
    .json-wrap{flex:1;overflow:auto;padding:var(--pad)}
    pre#jsonOut{font-family:'Cascadia Code',Consolas,monospace;font-size:11px;
                color:var(--pass);white-space:pre;word-break:break-all}
    /* ── Status bar ── */
    .sbar{background:var(--panel);border-top:1px solid var(--border);
          padding:4px var(--pad);font-size:11px;color:var(--fg-sub);
          display:flex;justify-content:space-between;flex-shrink:0}
    .sbar-ok{color:var(--pass)}
    .sbar-err{color:var(--fail)}
    .sbar-warn{color:var(--warn)}
    /* ── Group Tags styles ── */
    .group-tag-overlay{
      display:none;position:fixed;top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,.65);z-index:999;
      align-items:center;justify-content:center;
    }
    .group-tag-overlay.visible{display:flex}
    .group-tag-modal{
      background:var(--bg);border:1px solid var(--border);border-radius:8px;
      padding:20px 24px;min-width:360px;max-width:460px;
    }
    .group-tag-modal h3{margin:0 0 12px;font-size:14px;color:var(--warn)}
    .gtm-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:28px}
    .gtm-pill{
      display:inline-flex;align-items:center;gap:4px;
      font-size:11px;padding:3px 8px;border-radius:10px;
      background:rgba(78,201,176,.12);color:#4ec9b0;border:1px solid rgba(78,201,176,.25);
      cursor:default;
    }
    .gtm-pill .gtm-del{
      cursor:pointer;font-size:13px;color:#f44747;margin-left:2px;line-height:1;
    }
    .gtm-pill .gtm-del:hover{color:#ff6b6b}
    .gtm-add-row{display:flex;gap:6px}
    .gtm-input{
      flex:1;padding:6px 8px;background:var(--control);color:var(--fg);
      border:1px solid var(--border);border-radius:var(--radius);
      font-family:inherit;font-size:12px;
    }
    .gtm-input:focus{outline:none;border-color:var(--accent)}
    .gtm-btn{
      padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius);
      background:var(--btn);color:var(--btn-fg);cursor:pointer;font-family:inherit;font-size:12px;
    }
    .gtm-btn:hover{background:var(--btn-hover)}
    .gtm-btn.primary{border-color:var(--accent);color:var(--accent)}
    .gtm-close{margin-top:12px;text-align:right}
    /* ── Groups prop editor ── */
    .prop-groups-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;min-height:24px}
    .prop-group-pill{
      display:inline-flex;align-items:center;gap:3px;
      font-size:10px;padding:2px 7px;border-radius:8px;
      background:rgba(78,201,176,.12);color:#4ec9b0;border:1px solid rgba(78,201,176,.25);
    }
    .prop-group-pill .pg-del{cursor:pointer;color:#f44747;font-size:12px}
    .prop-group-add{display:flex;gap:4px;margin-top:6px}
  </style>
</head>
<body>
  <div class="hdr">
    &#x1F4CB; Menu Builder
    <button class="hdr-btn imp" onclick="importFromEngine()" title="Load menu layout from LocalWebEngine">&#x2B07; Import</button>
    <button class="hdr-btn exp" onclick="exportToEngine()" title="Save menu layout to LocalWebEngine">&#x2B06; Export</button>
    <button class="hdr-btn" onclick="openGroupTagManager()" title="Add, rename or remove group tags" style="border-color:#4ec9b0;color:#4ec9b0">&#x1F3F7; Group Tags</button>
    <span class="ver">2604.B1.V32.0</span>
  </div>

  <div class="workspace">
    <!-- ── Column 1: Item List ── -->
    <div class="col col-list">
      <div class="col-hdr">MENU ITEMS</div>
      <div class="item-list" id="itemList"></div>
      <div class="list-actions">
        <button class="la-btn" onclick="addItem()">+ Add</button>
        <button class="la-btn" onclick="moveUp()" title="Move selected up">&#x25B2;</button>
        <button class="la-btn" onclick="moveDown()" title="Move selected down">&#x25BC;</button>
        <button class="la-btn danger" onclick="deleteItem()">&#x2715; Del</button>
      </div>
    </div>

    <!-- ── Column 2: Properties ── -->
    <div class="col col-props">
      <div class="col-hdr">PROPERTIES</div>
      <div id="propsPanel">
        <div class="props-placeholder">Select an item to edit its properties</div>
      </div>
    </div>

    <!-- ── Column 3: JSON Preview ── -->
    <div class="col col-preview">
      <div class="col-hdr">JSON PREVIEW</div>
      <div class="json-wrap">
        <pre id="jsonOut">// Select or add items to see JSON</pre>
      </div>
    </div>
  </div>

  <div class="sbar">
    <span id="sbarLeft">0 items</span>
    <span id="sbarRight" class="sbar-ok">Ready</span>
  </div>

  <!-- ── Group Tag Manager Overlay ── -->
  <div class="group-tag-overlay" id="groupTagOverlay">
    <div class="group-tag-modal">
      <h3>&#x1F3F7; Manage Group Tags</h3>
      <p style="font-size:11px;color:#808080;margin:0 0 10px">These tags can be assigned to any menu item. Changes are saved with Export.</p>
      <div class="gtm-list" id="gtmList"></div>
      <div class="gtm-add-row">
        <input class="gtm-input" id="gtmNewTag" type="text" placeholder="New group tag name…" onkeydown="if(event.key==='Enter'){addGroupTag()}" />
        <button class="gtm-btn primary" onclick="addGroupTag()">+ Add</button>
      </div>
      <div class="gtm-close">
        <button class="gtm-btn" onclick="closeGroupTagManager()">Close</button>
      </div>
    </div>
  </div>

  <script type="text/javascript">
  //<![CDATA[
  (function(){
  'use strict';

  var ENGINE_BASE = 'http://127.0.0.1:8042';
  var SWATCHES = ['#007acc','#4ec9b0','#dcdcaa','#f44747','#569cd6',
                  '#c586c0','#ce9178','#6a9955','#d7ba7d','#9cdcfe'];

  /* ── State ── */
  var items = [];
  var selectedIdx = -1;
  var csrfToken = '';
  var dragSrc = -1;
  var GROUP_TAGS = ['Core','Scanning','Security','Reporting','Checklists','Data','DevOps','Config','Testing','Shopping'];

  /* ── Default item factory ── */
  function makeItem() {
    return {
      id: 'item_' + Date.now(),
      title: 'New Item',
      icon: '&#x1F4C4;',
      href: '',
      action: '',
      visible: true,
      color: '#007acc',
      groups: []
    };
  }

  /* ── Render item list ── */
  function renderList() {
    var el = document.getElementById('itemList');
    var html = '';
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var selCls = (i === selectedIdx) ? ' selected' : '';
      html += '<div class="item-row' + selCls + '" ' +
              'draggable="true" ' +
              'data-idx="' + i + '" ' +
              'onclick="selectItem(' + i + ')" ' +
              'ondragstart="onDragStart(event,' + i + ')" ' +
              'ondragover="onDragOver(event,' + i + ')" ' +
              'ondrop="onDrop(event,' + i + ')" ' +
              'ondragend="onDragEnd(event)">' +
        '<span class="drag-handle">&#x2630;</span>' +
        '<span class="item-icon">' + (it.icon || '&#x25A0;') + '</span>' +
        '<span class="item-title">' + escHtml(it.title) + '</span>' +
        '<span class="item-vis">' + (it.visible ? '&#x1F441;' : '&#x1F648;') + '</span>' +
        '</div>';
    }
    el.innerHTML = html;
    document.getElementById('sbarLeft').textContent = items.length + ' item' + (items.length === 1 ? '' : 's');
    updateJson();
  }

  /* ── Render property panel ── */
  function renderProps() {
    var panel = document.getElementById('propsPanel');
    if (selectedIdx < 0 || selectedIdx >= items.length) {
      panel.innerHTML = '<div class="props-placeholder">Select an item to edit its properties</div>';
      return;
    }
    var it = items[selectedIdx];
    var swatchHtml = '';
    for (var s = 0; s < SWATCHES.length; s++) {
      var isAct = (it.color === SWATCHES[s]) ? ' active' : '';
      swatchHtml += '<div class="swatch' + isAct + '" title="' + SWATCHES[s] + '" ' +
                    'style="background:' + SWATCHES[s] + '" ' +
                    'onclick="setColor(\'' + SWATCHES[s] + '\')"></div>';
    }
    panel.innerHTML =
      '<div class="props-body">' +
        '<div class="prop-group">' +
          '<label class="prop-label" for="pTitle">Title</label>' +
          '<input class="prop-input" id="pTitle" type="text" value="' + escAttr(it.title) + '" oninput="setProp(\'title\',this.value)" />' +
        '</div>' +
        '<div class="prop-row">' +
          '<div class="prop-group">' +
            '<label class="prop-label" for="pIcon">Icon / Emoji</label>' +
            '<input class="prop-input" id="pIcon" type="text" value="' + escAttr(it.icon) + '" oninput="setProp(\'icon\',this.value)" />' +
          '</div>' +
          '<div class="prop-group">' +
            '<label class="prop-label" for="pVis">Visibility</label>' +
            '<select class="prop-input" id="pVis" onchange="setProp(\'visible\',this.value===\'true\')">' +
              '<option value="true"' + (it.visible ? ' selected="selected"' : '') + '>Visible</option>' +
              '<option value="false"' + (!it.visible ? ' selected="selected"' : '') + '>Hidden</option>' +
            '</select>' +
          '</div>' +
        '</div>' +
        '<div class="prop-group" style="position:relative">' +
          '<label class="prop-label" for="pHref">Link / URL</label>' +
          '<div style="display:flex;gap:4px">' +
            '<input class="prop-input" id="pHref" type="text" value="' + escAttr(it.href) + '" oninput="setProp(\'href\',this.value)" placeholder="e.g. scripts/dep-vis.html or http://127.0.0.1:8042" style="flex:1" />' +
            '<button class="prop-input" onclick="openFileBrowser()" title="Browse workspace files" style="flex:none;width:28px;cursor:pointer;font-size:14px;padding:0">&#x1F4C2;</button>' +
          '</div>' +
          '<div class="file-browser-drop" id="fileBrowserDrop" style="display:none;position:absolute;top:100%;left:0;right:0;z-index:99;max-height:260px;overflow-y:auto;background:#1e1e1e;border:1px solid #3c3c3c;border-radius:4px;margin-top:2px">' +
            '<div style="padding:6px 8px;font-size:10px;color:#808080">Loading&#x2026;</div>' +
          '</div>' +
        '</div>' +
        '<div class="prop-group">' +
          '<label class="prop-label" for="pAction">JS Action (optional)</label>' +
          '<input class="prop-input" id="pAction" type="text" value="' + escAttr(it.action) + '" oninput="setProp(\'action\',this.value)" placeholder="e.g. triggerScan(\'full\')" />' +
        '</div>' +
        '<div class="prop-group">' +
          '<label class="prop-label">Accent Colour</label>' +
          '<div class="swatch-row">' + swatchHtml + '</div>' +
          '<input class="prop-input" id="pColor" type="text" value="' + escAttr(it.color) + '" oninput="setProp(\'color\',this.value)" style="margin-top:6px" />' +
        '</div>' +
        '<div class="prop-group">' +
          '<label class="prop-label">Group Tags</label>' +
          '<div class="prop-groups-wrap" id="pGroupsWrap">' + _renderPropGroups(it) + '</div>' +
          '<div class="prop-group-add">' +
            '<select class="prop-input" id="pGroupAdd" style="flex:1;font-size:11px">' +
              _renderGroupOptions(it) +
            '</select>' +
            '<button class="prop-input" onclick="addGroupToItem()" title="Add selected group tag" style="flex:none;width:28px;cursor:pointer;font-size:14px;padding:0">+</button>' +
          '</div>' +
        '</div>' +
        '<div class="prop-group">' +
          '<label class="prop-label" for="pId">ID (read-only)</label>' +
          '<input class="prop-input" id="pId" type="text" value="' + escAttr(it.id) + '" readonly="readonly" style="opacity:.5;cursor:default" />' +
        '</div>' +
      '</div>';
  }

  /* ── Update JSON preview ── */
  function updateJson() {
    var out = document.getElementById('jsonOut');
    if (items.length === 0) { out.textContent = '// No items'; return; }
    try {
      out.textContent = JSON.stringify(items, null, 2);
    } catch(e) {
      out.textContent = '// JSON error: ' + e.message;
    }
  }

  /* ── Item operations ── */
  function selectItem(idx) {
    selectedIdx = idx;
    renderList();
    renderProps();
  }

  function addItem() {
    items.push(makeItem());
    selectedIdx = items.length - 1;
    renderList();
    renderProps();
    setStatus('Item added', 'ok');
  }

  function deleteItem() {
    if (selectedIdx < 0 || selectedIdx >= items.length) { return; }
    items.splice(selectedIdx, 1);
    if (selectedIdx >= items.length) { selectedIdx = items.length - 1; }
    renderList();
    renderProps();
    setStatus('Item deleted', 'warn');
  }

  function moveUp() {
    if (selectedIdx <= 0) { return; }
    var tmp = items[selectedIdx]; items[selectedIdx] = items[selectedIdx - 1]; items[selectedIdx - 1] = tmp;
    selectedIdx--;
    renderList();
    renderProps();
  }

  function moveDown() {
    if (selectedIdx < 0 || selectedIdx >= items.length - 1) { return; }
    var tmp = items[selectedIdx]; items[selectedIdx] = items[selectedIdx + 1]; items[selectedIdx + 1] = tmp;
    selectedIdx++;
    renderList();
    renderProps();
  }

  function setProp(key, val) {
    if (selectedIdx < 0 || selectedIdx >= items.length) { return; }
    items[selectedIdx][key] = val;
    /* refresh list label/icon live without full re-render */
    updateJson();
    var rows = document.getElementById('itemList').querySelectorAll('.item-row');
    if (rows[selectedIdx]) {
      var itEl = rows[selectedIdx];
      var iconEl = itEl.querySelector('.item-icon');
      var titleEl = itEl.querySelector('.item-title');
      var visEl = itEl.querySelector('.item-vis');
      if (iconEl && key === 'icon') { iconEl.innerHTML = val; }
      if (titleEl && key === 'title') { titleEl.textContent = val; }
      if (visEl && key === 'visible') { visEl.innerHTML = val ? '&#x1F441;' : '&#x1F648;'; }
    }
    document.getElementById('sbarLeft').textContent = items.length + ' item' + (items.length === 1 ? '' : 's');
  }

  function setColor(hex) {
    setProp('color', hex);
    var pColor = document.getElementById('pColor');
    if (pColor) { pColor.value = hex; }
    /* update swatch highlights */
    var swatches = document.querySelectorAll('.swatch');
    for (var s = 0; s < swatches.length; s++) {
      if (swatches[s].title === hex) { swatches[s].className = 'swatch active'; }
      else { swatches[s].className = 'swatch'; }
    }
  }
  window.setColor = setColor;

  /* ── Drag-and-drop reordering ── */
  function onDragStart(e, idx) {
    dragSrc = idx;
    e.dataTransfer.effectAllowed = 'move';
    var rows = document.getElementById('itemList').querySelectorAll('.item-row');
    if (rows[idx]) { rows[idx].className = (rows[idx].className + ' dragging').trim(); }
  }

  function onDragOver(e, idx) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    var rows = document.getElementById('itemList').querySelectorAll('.item-row');
    for (var i = 0; i < rows.length; i++) {
      rows[i].className = rows[i].className.replace(' drag-over','');
    }
    if (rows[idx] && idx !== dragSrc) {
      rows[idx].className = (rows[idx].className + ' drag-over').trim();
    }
  }

  function onDrop(e, idx) {
    e.preventDefault();
    if (dragSrc < 0 || dragSrc === idx) { return; }
    var moved = items.splice(dragSrc, 1)[0];
    var newIdx = (idx > dragSrc) ? idx - 1 : idx;
    items.splice(newIdx, 0, moved);
    selectedIdx = newIdx;
    renderList();
    renderProps();
  }

  function onDragEnd() {
    dragSrc = -1;
    var rows = document.getElementById('itemList').querySelectorAll('.item-row');
    for (var i = 0; i < rows.length; i++) {
      rows[i].className = rows[i].className.replace(' dragging','').replace(' drag-over','');
    }
  }

  /* ── CSRF token fetch ── */
  function fetchCsrf(cb) {
    if (csrfToken) { cb(csrfToken); return; }
    fetch(ENGINE_BASE + '/api/csrf-token').then(function(r){
      return r.json();
    }).then(function(d){
      csrfToken = d.token || '';
      cb(csrfToken);
    }).catch(function(){
      cb('');
    });
  }

  /* ── Import from LocalWebEngine ── */
  function importFromEngine() {
    setStatus('Importing from LocalWebEngine&#x2026;', 'ok');
    fetch(ENGINE_BASE + '/api/config/menus').then(function(r){
      if (!r.ok) { throw new Error('HTTP ' + r.status); }
      return r.json();
    }).then(function(data){
      if (Array.isArray(data)) {
        items = data;
      } else if (data && Array.isArray(data.items)) {
        items = data.items;
      } else {
        throw new Error('Unexpected response format');
      }
      selectedIdx = items.length > 0 ? 0 : -1;
      renderList();
      renderProps();
      setStatus('Imported ' + items.length + ' items from engine', 'ok');
    }).catch(function(err){
      setStatus('Import failed: ' + err.message, 'err');
    });
  }

  /* ── Export to LocalWebEngine ── */
  function exportToEngine() {
    if (items.length === 0) { setStatus('Nothing to export', 'warn'); return; }
    setStatus('Fetching CSRF token&#x2026;', 'ok');
    fetchCsrf(function(tok) {
      if (!tok) {
        setStatus('Engine offline or no CSRF token', 'err');
        return;
      }
      var payload = JSON.stringify({ items: items });
      fetch(ENGINE_BASE + '/api/config/menus', {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRF-Token': tok
        },
        body: payload
      }).then(function(r){
        if (!r.ok) { throw new Error('HTTP ' + r.status); }
        return r.json();
      }).then(function(){
        setStatus('Exported ' + items.length + ' items to engine', 'ok');
      }).catch(function(err){
        setStatus('Export failed: ' + err.message, 'err');
      });
    });
  }

  /* ── Status bar helper ── */
  function setStatus(msg, level) {
    var el = document.getElementById('sbarRight');
    if (!el) { return; }
    el.innerHTML = msg;
    el.className = level === 'err' ? 'sbar-err' : level === 'warn' ? 'sbar-warn' : 'sbar-ok';
  }

  /* ── HTML escape helpers ── */
  function escHtml(s) {
    if (!s) { return ''; }
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
  function escAttr(s) {
    if (!s) { return ''; }
    return escHtml(s).replace(/"/g, '&quot;');
  }

  /* ── Group Tags helpers for props panel ── */
  function _renderPropGroups(it) {
    var g = it.groups || [];
    if (g.length === 0) { return '<span style="font-size:10px;color:#808080">No groups assigned</span>'; }
    var html = '';
    for (var i = 0; i < g.length; i++) {
      html += '<span class="prop-group-pill">' + escHtml(g[i]) +
        ' <span class="pg-del" onclick="removeGroupFromItem(\'' + escAttr(g[i]) + '\')">&times;</span></span>';
    }
    return html;
  }

  function _renderGroupOptions(it) {
    var assigned = it.groups || [];
    var html = '<option value="">-- select tag --</option>';
    for (var i = 0; i < GROUP_TAGS.length; i++) {
      var inUse = false;
      for (var j = 0; j < assigned.length; j++) { if (assigned[j] === GROUP_TAGS[i]) { inUse = true; break; } }
      if (!inUse) {
        html += '<option value="' + escAttr(GROUP_TAGS[i]) + '">' + escHtml(GROUP_TAGS[i]) + '</option>';
      }
    }
    return html;
  }

  function addGroupToItem() {
    if (selectedIdx < 0) { return; }
    var sel = document.getElementById('pGroupAdd');
    if (!sel || !sel.value) { return; }
    var it = items[selectedIdx];
    if (!it.groups) { it.groups = []; }
    if (it.groups.indexOf(sel.value) === -1) { it.groups.push(sel.value); }
    renderProps();
    updateJson();
  }
  window.addGroupToItem = addGroupToItem;

  function removeGroupFromItem(tag) {
    if (selectedIdx < 0) { return; }
    var it = items[selectedIdx];
    if (!it.groups) { return; }
    var idx = it.groups.indexOf(tag);
    if (idx !== -1) { it.groups.splice(idx, 1); }
    renderProps();
    updateJson();
  }
  window.removeGroupFromItem = removeGroupFromItem;

  /* ── Group Tag Manager (modal overlay) ── */
  function openGroupTagManager() {
    var ov = document.getElementById('groupTagOverlay');
    if (ov) { ov.className = 'group-tag-overlay visible'; }
    _renderGroupTagList();
  }
  window.openGroupTagManager = openGroupTagManager;

  function closeGroupTagManager() {
    var ov = document.getElementById('groupTagOverlay');
    if (ov) { ov.className = 'group-tag-overlay'; }
  }
  window.closeGroupTagManager = closeGroupTagManager;

  function _renderGroupTagList() {
    var el = document.getElementById('gtmList');
    if (!el) { return; }
    if (GROUP_TAGS.length === 0) {
      el.innerHTML = '<span style="font-size:11px;color:#808080">No group tags defined yet</span>';
      return;
    }
    var html = '';
    for (var i = 0; i < GROUP_TAGS.length; i++) {
      html += '<span class="gtm-pill">' + escHtml(GROUP_TAGS[i]) +
        ' <span class="gtm-del" onclick="deleteGroupTag(' + i + ')" title="Remove this tag">&times;</span></span>';
    }
    el.innerHTML = html;
  }

  function addGroupTag() {
    var inp = document.getElementById('gtmNewTag');
    if (!inp || !inp.value.trim()) { return; }
    var tag = inp.value.trim();
    /* prevent duplicates */
    for (var i = 0; i < GROUP_TAGS.length; i++) {
      if (GROUP_TAGS[i].toLowerCase() === tag.toLowerCase()) {
        setStatus('Tag "' + tag + '" already exists', 'warn');
        return;
      }
    }
    GROUP_TAGS.push(tag);
    inp.value = '';
    _renderGroupTagList();
    /* refresh props panel to include new tag in dropdown */
    if (selectedIdx >= 0) { renderProps(); }
    setStatus('Added group tag: ' + tag, 'ok');
  }
  window.addGroupTag = addGroupTag;

  function deleteGroupTag(idx) {
    var tag = GROUP_TAGS[idx];
    GROUP_TAGS.splice(idx, 1);
    /* also remove from any items that have it */
    for (var i = 0; i < items.length; i++) {
      if (!items[i].groups) { continue; }
      var gi = items[i].groups.indexOf(tag);
      if (gi !== -1) { items[i].groups.splice(gi, 1); }
    }
    _renderGroupTagList();
    if (selectedIdx >= 0) { renderProps(); }
    updateJson();
    setStatus('Removed group tag: ' + tag, 'ok');
  }
  window.deleteGroupTag = deleteGroupTag;

  /* ── File path browser for href field ── */
  var _fileBrowserOpen = false;
  var _cachedFiles = null;

  function openFileBrowser() {
    var drop = document.getElementById('fileBrowserDrop');
    if (!drop) { return; }
    if (_fileBrowserOpen) { closeFileBrowser(); return; }
    _fileBrowserOpen = true;
    drop.style.display = 'block';
    if (_cachedFiles) {
      _renderFileBrowser(_cachedFiles, drop, '');
      return;
    }
    drop.innerHTML = '<div style="padding:6px 8px;font-size:10px;color:#808080">Loading workspace files&#x2026;</div>';
    fetch(ENGINE_BASE + '/api/workspace/files').then(function(r){
      if (!r.ok) { throw new Error('HTTP ' + r.status); }
      return r.json();
    }).then(function(data){
      var files = Array.isArray(data) ? data : (data.files || []);
      _cachedFiles = files;
      _renderFileBrowser(files, drop, '');
    }).catch(function(err){
      drop.innerHTML = '<div style="padding:6px 8px;font-size:10px;color:#f44747">Engine offline: ' + escHtml(err.message) + '</div>';
    });
  }
  window.openFileBrowser = openFileBrowser;

  function closeFileBrowser() {
    var drop = document.getElementById('fileBrowserDrop');
    if (drop) { drop.style.display = 'none'; }
    _fileBrowserOpen = false;
  }

  function _renderFileBrowser(files, drop, filterText) {
    var ft = (filterText || '').toLowerCase();
    var html = '<div style="padding:4px 6px;border-bottom:1px solid #3c3c3c">' +
      '<input type="text" placeholder="Filter files&#x2026;" value="' + escAttr(filterText) + '" ' +
      'oninput="filterFileBrowser(this.value)" ' +
      'style="width:100%;box-sizing:border-box;background:#252526;border:1px solid #3c3c3c;color:#d4d4d4;font-size:11px;padding:3px 6px;border-radius:3px;font-family:inherit" />' +
      '</div>';
    var shown = 0;
    for (var i = 0; i < files.length; i++) {
      var f = files[i];
      var path = typeof f === 'string' ? f : (f.path || f.name || '');
      if (ft && path.toLowerCase().indexOf(ft) === -1) { continue; }
      if (shown >= 100) {
        html += '<div style="padding:4px 8px;font-size:10px;color:#808080">&#x2026; and ' + (files.length - shown) + ' more</div>';
        break;
      }
      var isDir = path.charAt(path.length - 1) === '/' || path.charAt(path.length - 1) === '\\';
      var icon = isDir ? '&#x1F4C1;' : '&#x1F4C4;';
      html += '<div onclick="pickFile(\'' + escAttr(path) + '\')" ' +
        'style="padding:3px 8px;font-size:11px;color:#d4d4d4;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" ' +
        'onmouseover="this.style.background=\'#264f78\'" onmouseout="this.style.background=\'transparent\'">' +
        icon + ' ' + escHtml(path) + '</div>';
      shown++;
    }
    if (shown === 0) {
      html += '<div style="padding:6px 8px;font-size:10px;color:#808080">No files match</div>';
    }
    drop.innerHTML = html;
  }

  function filterFileBrowser(val) {
    var drop = document.getElementById('fileBrowserDrop');
    if (drop && _cachedFiles) { _renderFileBrowser(_cachedFiles, drop, val); }
  }
  window.filterFileBrowser = filterFileBrowser;

  function pickFile(path) {
    /* convert backslashes to forward slashes for consistency */
    var cleanPath = path.replace(/\\/g, '/');
    var inp = document.getElementById('pHref');
    if (inp) { inp.value = cleanPath; }
    setProp('href', cleanPath);
    closeFileBrowser();
  }
  window.pickFile = pickFile;

  /* Close file browser on outside click */
  document.addEventListener('click', function(ev){
    if (!_fileBrowserOpen) { return; }
    var drop = document.getElementById('fileBrowserDrop');
    if (drop && !drop.contains(ev.target) && ev.target.textContent.indexOf('\uD83D\uDCC2') === -1) {
      closeFileBrowser();
    }
  });

  /* ── Expose globals for onclick= attrs ── */
  window.selectItem  = selectItem;
  window.addItem     = addItem;
  window.deleteItem  = deleteItem;
  window.moveUp      = moveUp;
  window.moveDown    = moveDown;
  window.setProp     = setProp;
  window.importFromEngine = importFromEngine;

  window.onDragStart = onDragStart;
