<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PwShGUI-XHTML - Visualisation Venn</title>
  <!-- External CSS: base → responsive → layout -->
  <link rel="stylesheet" href="../../styles/pwshgui-base.css" />
  <link rel="stylesheet" href="../../styles/pwshgui-responsive.css" />
  <link rel="stylesheet" href="../../styles/layout-mastertight-wleftmenu.css" />
  <style type="text/css">
  /* Layout: kpe-CSS_MasterTight-wLeftMENU | VersionTag: 2605.B5.V46.0 */
  :root{--bg:#1e1e1e;--bg-alt:#2d2d30;--panel:#252526;--border:#3e3e42;--fg:#d4d4d4;
    --fg-dim:#888;--accent:#007acc;--pass:#4ec9b0;--warn:#dcdcaa;--fail:#f44747;
    --info:#569cd6;--font:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    --font-mono:'Cascadia Code','Consolas',monospace;--pad:14px;--gap:10px;--radius:6px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font);font-size:13px;background:var(--bg);color:var(--fg);
    display:flex;flex-direction:column;height:100vh;overflow:hidden}

  /* ── top bar ── */
  #topBar{background:linear-gradient(135deg,#1a3a5c,#007acc);color:#fff;
    padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  #topBar h1{font-size:16px;font-weight:600}
  .ver-badge{background:rgba(255,255,255,.18);padding:3px 10px;border-radius:10px;font-size:11px}

  /* ── main split: sidebar + canvas ── */
  #main{display:flex;flex:1;min-height:0;overflow:hidden}
  #leftPane{width:260px;min-width:180px;background:var(--panel);border-right:1px solid var(--border);
    display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
  #leftPane .sec-hdr{font-size:12px;font-weight:700;color:var(--accent);
    padding:10px 12px 6px;border-bottom:1px solid var(--border)}
  .pane-scroll{flex:1;overflow-y:auto;padding:8px 12px}

  /* folder list */
  .folder-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:4px;
    cursor:pointer;font-size:12px;transition:background .12s}
  .folder-item:hover{background:var(--bg-alt)}
  .folder-item.selected{background:#264f78;color:#fff}
  .folder-color{width:12px;height:12px;border-radius:3px;flex-shrink:0}
  .folder-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .folder-count{font-size:10px;color:var(--fg-dim)}
  .folder-meta{font-size:9px;color:var(--fg-dim);padding:0 8px 6px 26px;line-height:1.3}

  /* ── venn canvas ── */
  #canvasWrap{flex:1;position:relative;overflow:hidden}
  #vennCanvas{width:100%;height:100%;display:block}
  .venn-tooltip{position:absolute;pointer-events:none;background:#1a1a2e;border:1px solid var(--border);
    border-radius:6px;padding:10px 14px;font-size:11px;color:var(--fg);max-width:320px;
    box-shadow:0 4px 16px rgba(0,0,0,.5);z-index:50;display:none}
  .venn-tooltip h4{color:var(--accent);font-size:12px;margin-bottom:4px}
  .venn-tooltip .tt-row{display:flex;justify-content:space-between;gap:12px;padding:1px 0}
  .venn-tooltip .tt-label{color:var(--fg-dim)}
  .venn-tooltip .tt-val{font-family:var(--font-mono);color:var(--pass)}

  /* ── right detail panel ── */
  #rightPane{width:320px;min-width:200px;background:var(--panel);border-left:1px solid var(--border);
    display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
  #rightPane.collapsed{display:none}
  #rightResizer{width:6px;cursor:col-resize;background:linear-gradient(180deg,#2c2c31,#3a3a41);flex-shrink:0}
  #rightResizer.hidden{display:none}
  #rightPane .sec-hdr{font-size:12px;font-weight:700;color:var(--accent);
    padding:8px 10px 6px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
  .pane-actions{display:flex;align-items:center;gap:6px}
  .pane-actions .mini{font-size:10px;padding:2px 7px;border:1px solid var(--border);background:var(--bg-alt);color:var(--fg);border-radius:4px;cursor:pointer}
  .pane-actions .mini:hover{filter:brightness(1.15)}
  .detail-scroll{flex:1;overflow-y:auto;padding:8px 12px}
  .detail-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
    padding:10px;margin-bottom:8px}
  .detail-card h4{font-size:12px;color:var(--pass);margin-bottom:4px}
  .detail-card .meta{font-size:10px;color:var(--fg-dim);margin-bottom:4px}
  .detail-card table{width:100%;font-size:11px;border-collapse:collapse}
  .detail-card td{padding:2px 6px;border-bottom:1px solid var(--border)}
  .detail-card td:first-child{color:var(--fg-dim);width:90px}

  /* extension breakdown bar */
  .ext-bar{height:6px;border-radius:3px;background:var(--border);margin:4px 0;overflow:hidden;display:flex}
  .ext-seg{height:100%}

  /* legend */
  .legend{display:flex;flex-wrap:wrap;gap:8px;padding:8px 12px;border-top:1px solid var(--border);
    background:var(--bg-alt);flex-shrink:0}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--fg-dim)}
  .legend-dot{width:10px;height:10px;border-radius:2px}

  /* ── filter bar ── */
  #filterBar{display:flex;gap:8px;padding:8px 12px;background:var(--bg-alt);
    border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;flex-shrink:0}
  #filterBar select,#filterBar input{background:var(--bg);color:var(--fg);
    border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:11px}
  #filterBar input[type="text"]{flex:1;min-width:140px}
  .btn{background:var(--accent);color:#fff;border:none;padding:4px 12px;
    border-radius:4px;cursor:pointer;font-size:11px}
  .btn:hover{filter:brightness(1.15)}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--fg)}
  .btn-outline:hover{background:var(--bg-alt)}
  .btn-metrics{background:#2f7d57}
  .btn-metrics:hover{filter:brightness(1.1)}

  #metricsPanel{position:absolute;right:14px;top:14px;width:420px;max-width:calc(100% - 28px);
    max-height:78%;overflow:auto;z-index:80;background:rgba(28,28,32,0.98);border:1px solid var(--border);
    border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.45);padding:12px;display:none}
  #metricsPanel h3{font-size:13px;color:var(--accent);margin-bottom:8px}
  #metricsPanel .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
  #metricsPanel .chip{font-size:10px;border:1px solid var(--border);border-radius:10px;padding:3px 8px;color:var(--fg-dim)}
  #metricsPanel .kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
  #metricsPanel .kpi div{background:#202026;border:1px solid var(--border);border-radius:6px;padding:6px}
  #metricsPanel .kpi b{display:block;font-size:13px;color:var(--pass)}
  #metricsPanel .kpi span{font-size:10px;color:var(--fg-dim)}
  #metricsPanel table{width:100%;border-collapse:collapse;font-size:10px}
  #metricsPanel th,#metricsPanel td{border-bottom:1px solid var(--border);padding:4px 6px;text-align:left}
  #metricsPanel th{color:var(--info);font-weight:600}
  #metricsPanel a{color:#8ecbff;text-decoration:none}
  #metricsPanel a:hover{text-decoration:underline}
  #metricsPanel.pinned{position:relative;right:auto;top:auto;width:360px;max-width:360px;max-height:none;height:100%;
    border-left:1px solid var(--border);border-radius:0;box-shadow:none;background:var(--panel);display:block}

  /* ── status bar ── */
  #statusBar{background:var(--panel);border-top:1px solid var(--border);
    padding:4px 12px;font-size:10px;color:var(--fg-dim);display:flex;gap:16px;flex-shrink:0}

  .detail-placeholder{color:#666;text-align:center;padding:30px 0}

  /* ── responsive ── */
  @media(max-width:900px){#leftPane{width:180px}#rightPane{width:240px}}
  @media(max-width:640px){#leftPane,#rightPane{display:none}#canvasWrap{min-width:100%}}
  </style>

<body>
  <!-- ═══════════ TOP BAR ═══════════ -->
  <div id="topBar">
    <h1>&#x1F50D; PwShGUI-XHTML - Visualisation Venn</h1>
    <span class="ver-badge" id="headerVersion">v2605.B5.V46.0</span>
  </div>
  <!-- ═══════════ FILTER BAR ═══════════ -->
  <div id="filterBar">
    <select id="filterExt" title="Filter by extension">
      <option value="">All Extensions</option>
    </select>
    <select id="filterMinFiles" title="Minimum file count">

  <!-- ═══════════ MAIN LAYOUT ═══════════ -->
  <div id="main">
    <!-- left: folder list -->
    <div id="leftPane">
      <div class="sec-hdr">Workspace Folders</div>
      <div id="folderList" class="pane-scroll"></div>
    </div>

    <!-- center: Venn canvas -->
    <div id="canvasWrap">
      <svg id="vennCanvas" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="tooltip" class="venn-tooltip"></div>

    </div>

    <div id="rightResizer" title="Resize Selection Detail pane"></div>

    <!-- right: detail panel -->
    <div id="rightPane">
      <div class="sec-hdr"><span>Selection Detail</span><span class="pane-actions"><button class="mini" id="btnCollapseDetail" type="button">Collapse</button></span></div>
      <div id="detailPanel" class="detail-scroll">
        <p class="detail-placeholder">Click a circle to inspect</p>
      </div>
    </div>
  </div>

  <!-- ═══════════ LEGEND ═══════════ -->
  <div class="legend" id="legendBar"></div>

  <!-- ═══════════ STATUS BAR ═══════════ -->
  <div id="statusBar">
    <span id="statFolders">Folders: 0</span>
    <span id="statFiles">Files: 0</span>
    <span id="statSize">Total: 0 KB</span>
    <span id="statSelected">Selected: 0</span>
  </div>

  <script type="text/javascript">
  //<![CDATA[
  /* ── PwShGUI Dependency Venn – v2605.B5.V46.0 ── */
  (function(){
    'use strict';

    /* ── colour palette ── */
    var PALETTE = [
      '#89b4fa','#a6e3a1','#f38ba8','#f9e2af','#cba6f7',
      '#94e2d5','#fab387','#74c7ec','#b4befe','#f5c2e7',
      '#eba0ac','#89dceb','#a6adc8','#f2cdcd','#585b70'
    ];
    /* ── extension colour map ── */
    var EXT_COLORS = {
      '.ps1':'#569cd6','.psm1':'#4ec9b0','.psd1':'#ce9140','.json':'#dcdcaa','.xml':'#d16969',
      '.xhtml':'#c586c0','.html':'#f44747','.md':'#608b4e','.css':'#9cdcfe','.py':'#4fc1ff',
      '.js':'#dcdcaa','.bat':'#d7ba7d','.txt':'#d4d4d4','.csv':'#b5cea8','.bin':'#808080'
    };

    var CURRENT_VERSION = '2605.B5.V46.0';
    var WORKSPACE_FOLDER_HINTS = [
      'scripts','scripts/XHTML-Checker','modules','config','tests','styles','todo','docs','agents',
      'tools','logs','reports','Report','temp','UPM','gallery','pki','sin_registry','sovereign-kernel',
      '~README.md','~REPORTS','CarGame','Fing-mcp'
    ];
    var METRIC_FILES = [
      '../../CHANGELOG.md',
      '../../~README.md/CHANGELOG.md',
      '../../~README.md/FILES-MANIFEST.md'
    ];

    /* ── state ── */
    var DATA = {folders:[], files:[], metrics:[]};
    var selectedFolders = {};
    var metricPanelVisible = false;
    var metricsPinned = false;
    var metricRawFiles = {};
    var manifestVersion = '';
    var isResizingRightPane = false;
    var rightPaneWidth = 320;

    /* ── DOM refs ── */
    var svg = document.getElementById('vennCanvas');
    var folderListEl = document.getElementById('folderList');
    var detailEl = document.getElementById('detailPanel');
    var tooltipEl = document.getElementById('tooltip');
    var legendEl = document.getElementById('legendBar');
    var metricsPanelEl = document.getElementById('metricsPanel');
    var mainEl = document.getElementById('main');
    var canvasWrapEl = document.getElementById('canvasWrap');
    var rightPaneEl = document.getElementById('rightPane');
    var rightResizerEl = document.getElementById('rightResizer');

    /* ════════════════════════════════════════════
       DATA: Load from embedded workspace scan
       In production, load from temp/vis-data-final.json
       or provide inline fallback.
       ════════════════════════════════════════════ */
    function loadData(){
      loadMetricFiles();

      /* Try fetch from vis-data-final.json (generated by Build-AgenticManifest or scan script) */
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '../../temp/vis-data-final.json', true);
      xhr.onload = function(){
        if(xhr.status === 200 || xhr.status === 0){
          try {
            var raw = JSON.parse(xhr.responseText);
            parseRawData(raw);
          } catch(e) {
            generateFallbackData();
          }
        } else { generateFallbackData(); }
      };
      xhr.onerror = function(){ generateFallbackData(); };
      xhr.send();
    }

    function parseRawData(raw){
      /* vis-data-final.json has {nodes:[{id,group,type,...}], links:[...]} */
      var folderMap = {};
      var files = [];
      if(raw.nodes){
        for(var i=0;i<raw.nodes.length;i++){
          var n = raw.nodes[i];
          if((n.type || '').toLowerCase() === 'directory') continue;
          var parts = (n.id||'').replace(/\\/g,'/').split('/');
          var folder = parts.length > 1 ? parts.slice(0,-1).join('/') : '(root)';
          var ext = '.' + ((n.id||'').split('.').pop()||'').toLowerCase();
          var modifiedAt = toDateString(n.modifiedOn || n.lastModified || n.updatedAt || n.mtime || '');
          var versionIssued = toDateString(n.versionIssuedDate || n.versionDate || n.releasedOn || '');
          var fObj = {name:parts[parts.length-1]||n.id, path:n.id, folder:folder, ext:ext,
            size:n.sizeBytes||0, version:n.version||'', type:n.type||'unknown',
            modifiedAt:modifiedAt, versionIssued:versionIssued};

          var chains = buildFolderChain(folder);
          for(var c=0;c<chains.length;c++){
            var chainName = chains[c];
            if(!folderMap[chainName]){
              folderMap[chainName] = {
                name:chainName, files:[], totalSize:0, latestChange:'', latestVersionIssued:'', depth:getDepth(chainName)
              };
            }
            folderMap[chainName].files.push(fObj);
            folderMap[chainName].totalSize += (n.sizeBytes||0);
            folderMap[chainName].latestChange = pickLatest(folderMap[chainName].latestChange, modifiedAt);
            folderMap[chainName].latestVersionIssued = pickLatest(folderMap[chainName].latestVersionIssued, versionIssued);
          }
          files.push(fObj);
        }
      }

      ensureHintFolders(folderMap);
      var folders = [];
      for(var k in folderMap){
        if(folderMap.hasOwnProperty(k)){
          folders.push(folderMap[k]);
        }
      }
      folders.sort(function(a,b){
        if(a.depth !== b.depth) return a.depth - b.depth;
        if(a.files.length !== b.files.length) return b.files.length - a.files.length;
        return a.name.localeCompare(b.name);
      });
      DATA.folders = folders;
      DATA.files = files;
      initUI();
    }

    function generateFallbackData(){
      /* Hardcoded summary when JSON unavailable */
      var dirs = [
        {name:'modules',files:generatePlaceholders('modules',26,'.psm1',8000),totalSize:208000},
        {name:'scripts',files:generatePlaceholders('scripts',55,'.ps1',4000),totalSize:220000},
        {name:'scripts/XHTML-Checker',files:generatePlaceholders('scripts/XHTML-Checker',9,'.xhtml',12000),totalSize:108000},
        {name:'config',files:generatePlaceholders('config',18,'.json',3000),totalSize:54000},
        {name:'tests',files:generatePlaceholders('tests',16,'.ps1',5000),totalSize:80000},
        {name:'styles',files:generatePlaceholders('styles',21,'.css',1500),totalSize:31500},
        {name:'todo',files:generatePlaceholders('todo',12,'.json',2000),totalSize:24000},
        {name:'~README.md',files:generatePlaceholders('~README.md',18,'.md',4000),totalSize:72000},
        {name:'UPM/docs',files:generatePlaceholders('UPM/docs',3,'.xhtml',10000),totalSize:30000},
        {name:'agents',files:generatePlaceholders('agents',2,'.ps1',6000),totalSize:12000},
        {name:'(root)',files:generatePlaceholders('(root)',8,'.ps1',15000),totalSize:120000},
        {name:'pki',files:generatePlaceholders('pki',4,'.pem',2000),totalSize:8000},
        {name:'sin_registry',files:generatePlaceholders('sin_registry',3,'.json',3000),totalSize:9000}
      ];
      var allFiles = [];
      for(var i=0;i<dirs.length;i++) allFiles = allFiles.concat(dirs[i].files);
      var folderMap = indexFoldersByName(dirs);
      for(var d=0;d<dirs.length;d++){
        dirs[d].latestChange = randomPastDate(45);
        dirs[d].latestVersionIssued = randomPastDate(120);
        dirs[d].depth = getDepth(dirs[d].name);
      }
      ensureHintFolders(folderMap);
      var expanded = [];
      for(var key in folderMap){
        if(folderMap.hasOwnProperty(key)) expanded.push(folderMap[key]);
      }
      expanded.sort(function(a,b){
        if(a.depth !== b.depth) return a.depth - b.depth;
        if(a.files.length !== b.files.length) return b.files.length - a.files.length;
        return a.name.localeCompare(b.name);
      });
      DATA.folders = expanded;
      DATA.files = allFiles;
      initUI();
    }

    function generatePlaceholders(folder,count,ext,avgSize){
      var arr = [];
      for(var i=0;i<count;i++){
        arr.push({name:'file'+(i+1)+ext, path:folder+'/file'+(i+1)+ext,
          folder:folder, ext:ext, size:avgSize + Math.floor(Math.random()*avgSize*0.4-avgSize*0.2),
          version:CURRENT_VERSION, type:ext.replace('.','')});
      }
      return arr;
    }

    /* ════════════════════════════════════════════
       UI INITIALISATION
       ════════════════════════════════════════════ */
    function initUI(){
      buildFolderList();
      buildExtFilter();
      buildLegend();
      syncHeaderAndManifestVersion();
      for(var i=0;i<DATA.folders.length && i<8;i++){
        selectedFolders[DATA.folders[i].name] = true;
      }
      markSelectedInList();
      drawVenn();
      updateStats();
      wireEvents();
      renderMetricsPanel();
    }

    function buildFolderList(){
      folderListEl.innerHTML = '';
      for(var i=0;i<DATA.folders.length;i++){
        var f = DATA.folders[i];
        var div = document.createElement('div');
        div.className = 'folder-item';
        div.setAttribute('data-folder', f.name);
        var indent = f.depth > 0 ? 'padding-left:' + (8 + (f.depth * 10)) + 'px' : '';
        div.innerHTML = '<span class="folder-color" style="background:'+PALETTE[i%PALETTE.length]+'"></span>'
          + '<span class="folder-name" style="'+indent+'" title="'+esc(f.name)+'">'+esc(f.name)+'</span>'
          + '<span class="folder-count">'+f.files.length+'</span>';
        folderListEl.appendChild(div);

        var meta = document.createElement('div');
        meta.className = 'folder-meta';
        meta.textContent = 'Last change: ' + (f.latestChange || 'n/a') + ' | Version issued: ' + (f.latestVersionIssued || 'n/a');
        folderListEl.appendChild(meta);
      }
    }

    function buildExtFilter(){
      var exts = {};
      for(var i=0;i<DATA.files.length;i++) exts[DATA.files[i].ext] = true;
      var sel = document.getElementById('filterExt');
      sel.innerHTML = '<option value="">All Extensions</option>';
      var sorted = Object.keys(exts).sort();
      for(var j=0;j<sorted.length;j++){
        var o = document.createElement('option');
        o.value = sorted[j]; o.textContent = sorted[j];
        sel.appendChild(o);
      }
    }

    function buildLegend(){
      legendEl.innerHTML = '';
      for(var i=0;i<DATA.folders.length && i<12;i++){
        var f = DATA.folders[i];
        legendEl.innerHTML += '<span class="legend-item"><span class="legend-dot" style="background:'
          +PALETTE[i%PALETTE.length]+'"></span>'+esc(f.name)+'</span>';
      }
    }

    /* ════════════════════════════════════════════
       VENN DIAGRAM RENDERING (SVG)
       ════════════════════════════════════════════ */
    function drawVenn(){
      var ns = 'http://www.w3.org/2000/svg';
      while(svg.firstChild) svg.removeChild(svg.firstChild);

      var rect = svg.getBoundingClientRect();
      var W = rect.width || 800;
      var H = rect.height || 500;
      var cx = W/2, cy = H/2;

      var selected = [];
      for(var i=0;i<DATA.folders.length;i++){
        if(selectedFolders[DATA.folders[i].name] && isFolderFilteredIn(DATA.folders[i])){
          selected.push({idx:i, folder:DATA.folders[i]});
        }
      }
      if(selected.length === 0) return;

      /* Calculate radii proportional to sqrt of totalSize */
      var maxSize = 0;
      for(var s=0;s<selected.length;s++){
        if(selected[s].folder.totalSize > maxSize) maxSize = selected[s].folder.totalSize;
      }
      var maxR = Math.min(W,H) * 0.28;
      var minR = 30;

      /* Position circles in an elliptical arrangement */
      var angleStep = (2 * Math.PI) / Math.max(selected.length, 1);
      var spread = Math.min(W,H) * 0.22;
      if(selected.length <= 3) spread = Math.min(W,H) * 0.12;

      for(var c=0;c<selected.length;c++){
        var f = selected[c].folder;
        var r = maxSize > 0 ? Math.max(minR, maxR * Math.sqrt(f.totalSize / maxSize)) : minR;
        var angle = angleStep * c - Math.PI/2;
        var px = cx + Math.cos(angle) * spread;
        var py = cy + Math.sin(angle) * spread;
        var color = PALETTE[selected[c].idx % PALETTE.length];

        /* circle */
        var circle = document.createElementNS(ns,'circle');
        circle.setAttribute('cx', px);
        circle.setAttribute('cy', py);
        circle.setAttribute('r', r);
        circle.setAttribute('fill', color);
        circle.setAttribute('fill-opacity', '0.18');
        circle.setAttribute('stroke', color);
        circle.setAttribute('stroke-width', '2');
        circle.setAttribute('data-folder', f.name);
        circle.setAttribute('data-idx', selected[c].idx);
        circle.style.cursor = 'pointer';
        circle.style.transition = 'fill-opacity 0.2s';
        svg.appendChild(circle);

        /* label */
        var text = document.createElementNS(ns,'text');
        text.setAttribute('x', px);
        text.setAttribute('y', py - r*0.05);
        text.setAttribute('text-anchor','middle');
        text.setAttribute('fill','#fff');
        text.setAttribute('font-size','12');
        text.setAttribute('font-weight','600');
        text.setAttribute('pointer-events','none');
        text.textContent = f.name.length > 20 ? f.name.substring(0,18)+'…' : f.name;
        svg.appendChild(text);

        /* file count sub-label */
        var sub = document.createElementNS(ns,'text');
        sub.setAttribute('x', px);
        sub.setAttribute('y', py + 14);
        sub.setAttribute('text-anchor','middle');
        sub.setAttribute('fill', color);
        sub.setAttribute('font-size','10');
        sub.setAttribute('pointer-events','none');
        sub.textContent = f.files.length + ' files · ' + formatBytes(f.totalSize);
        svg.appendChild(sub);

        /* extension breakdown arc segments inside circle */
        drawExtBreakdown(ns, px, py + 26, r * 0.6, f);
      }

      /* Draw overlap indicators for folders sharing same extensions */
      drawOverlapLines(ns, selected, cx, cy, spread, maxSize, maxR, minR);
    }

    function drawExtBreakdown(ns, cx, cy, width, folder){
      var extMap = {};
      for(var i=0;i<folder.files.length;i++){
        var e = folder.files[i].ext;
        extMap[e] = (extMap[e]||0) + 1;
      }
      var exts = Object.keys(extMap).sort(function(a,b){return extMap[b]-extMap[a];});
      var total = folder.files.length;
      var barH = 4;
      var startX = cx - width/2;
      var x = startX;
      for(var j=0;j<exts.length && j < 6;j++){
        var segW = (extMap[exts[j]]/total) * width;
        var rect = document.createElementNS(ns,'rect');
        rect.setAttribute('x', x);
        rect.setAttribute('y', cy);
        rect.setAttribute('width', Math.max(segW, 2));
        rect.setAttribute('height', barH);
        rect.setAttribute('rx','2');
        rect.setAttribute('fill', EXT_COLORS[exts[j]] || '#666');
        rect.setAttribute('pointer-events','none');
        svg.appendChild(rect);
        x += segW;
      }
    }

    function drawOverlapLines(ns, selected, cx, cy, spread, maxSize, maxR, minR){
      /* Draw subtle connecting lines between folders that share file extensions */
      var angleStep = (2*Math.PI)/Math.max(selected.length,1);
      for(var i=0;i<selected.length;i++){
        for(var j=i+1;j<selected.length;j++){
          var shared = countSharedExts(selected[i].folder, selected[j].folder);
          if(shared < 2) continue;
          var ai = angleStep*i - Math.PI/2;
          var aj = angleStep*j - Math.PI/2;
          var x1 = cx+Math.cos(ai)*spread, y1 = cy+Math.sin(ai)*spread;
          var x2 = cx+Math.cos(aj)*spread, y2 = cy+Math.sin(aj)*spread;
          var line = document.createElementNS(ns,'line');
          line.setAttribute('x1',x1);line.setAttribute('y1',y1);
          line.setAttribute('x2',x2);line.setAttribute('y2',y2);
          line.setAttribute('stroke','rgba(137,180,250,0.15)');
          line.setAttribute('stroke-width', Math.min(shared, 6));
          line.setAttribute('stroke-dasharray','4,4');
          line.setAttribute('pointer-events','none');
          svg.insertBefore(line, svg.firstChild);
        }
      }
    }

    function countSharedExts(a, b){
      var ea = {}, eb = {};
      for(var i=0;i<a.files.length;i++) ea[a.files[i].ext]=true;
      for(var j=0;j<b.files.length;j++) eb[b.files[j].ext]=true;
      var count = 0;
      for(var k in ea){ if(ea.hasOwnProperty(k) && eb[k]) count++; }
      return count;
    }

    /* ════════════════════════════════════════════
       DETAIL PANEL
       ════════════════════════════════════════════ */
    function showFolderDetail(folderName){
      var folder = null;
      for(var i=0;i<DATA.folders.length;i++){
        if(DATA.folders[i].name === folderName){ folder = DATA.folders[i]; break; }
      }
      if(!folder){ detailEl.innerHTML = '<p style="color:#666;padding:20px">Not found</p>'; return; }

      var extMap = {};
      for(var j=0;j<folder.files.length;j++){
        var e = folder.files[j].ext;
        extMap[e] = (extMap[e]||0) + 1;
      }

      var html = '<div class="detail-card"><h4>'+esc(folder.name)+'</h4>'
        +'<div class="meta">'+folder.files.length+' files · '+formatBytes(folder.totalSize)+'</div>'
        +'<div class="ext-bar">';
      var exts = Object.keys(extMap).sort(function(a,b){return extMap[b]-extMap[a];});
      for(var k=0;k<exts.length;k++){
        var pct = (extMap[exts[k]]/folder.files.length*100).toFixed(1);
        html += '<span class="ext-seg" style="width:'+pct+'%;background:'+(EXT_COLORS[exts[k]]||'#666')
          +'" title="'+esc(exts[k])+': '+extMap[exts[k]]+'"></span>';
      }
      html += '</div><table>';
      for(var m=0;m<exts.length;m++){
        html += '<tr><td>'+esc(exts[m])+'</td><td>'+extMap[exts[m]]+'</td></tr>';
      }
      html += '</table></div>';

      /* File list */
      html += '<div class="detail-card"><h4>Files</h4><table>';
      var sorted = folder.files.slice().sort(function(a,b){return b.size-a.size;});
      for(var n=0;n<sorted.length && n<30;n++){
        var f = sorted[n];
        html += '<tr><td>'+esc(f.name)+'</td><td>'+formatBytes(f.size)+'</td></tr>';
      }
      if(sorted.length > 30) html += '<tr><td colspan="2" style="color:var(--fg-dim)">+'+(sorted.length-30)+' more</td></tr>';
      html += '</table></div>';

      detailEl.innerHTML = html;
    }

    /* ════════════════════════════════════════════
       EVENTS
       ════════════════════════════════════════════ */
    function wireEvents(){
      /* Folder list click */
      folderListEl.addEventListener('click', function(e){
        var item = e.target.closest('.folder-item');
        if(!item) return;
        var name = item.getAttribute('data-folder');
        if(selectedFolders[name]) delete selectedFolders[name];
        else selectedFolders[name] = true;
        markSelectedInList();
        drawVenn();
        updateStats();
      });

      /* SVG circle click/hover */
      svg.addEventListener('click', function(e){
        if(e.target.tagName === 'circle'){
          showFolderDetail(e.target.getAttribute('data-folder'));
        }
      });
      svg.addEventListener('mousemove', function(e){
        if(e.target.tagName === 'circle'){
          var f = findFolder(e.target.getAttribute('data-folder'));
          if(f){
            e.target.setAttribute('fill-opacity','0.35');
            showTooltip(e, f);
          }
        } else {
          hideTooltip();
          clearHover();
        }
      });
      svg.addEventListener('mouseleave', function(){ hideTooltip(); clearHover(); });

      /* Buttons */
      document.getElementById('btnSelectAll').addEventListener('click', function(){
        for(var i=0;i<DATA.folders.length;i++) selectedFolders[DATA.folders[i].name]=true;
        markSelectedInList(); drawVenn(); updateStats();
      });
      document.getElementById('btnInvert').addEventListener('click', function(){
        for(var i=0;i<DATA.folders.length;i++){
          var n = DATA.folders[i].name;
          if(selectedFolders[n]) delete selectedFolders[n]; else selectedFolders[n]=true;
        }
        markSelectedInList(); drawVenn(); updateStats();
      });
      document.getElementById('btnRefresh').addEventListener('click', function(){ loadData(); });
      document.getElementById('btnExportSVG').addEventListener('click', exportSVG);
      document.getElementById('btnMetrics').addEventListener('click', toggleMetricsMenu);
      document.getElementById('btnPinMetrics').addEventListener('click', togglePinMetrics);
      document.getElementById('btnCollapseDetail').addEventListener('click', toggleDetailPane);

      rightResizerEl.addEventListener('mousedown', startRightPaneResize);
      document.addEventListener('mousemove', onRightPaneResize);
      document.addEventListener('mouseup', stopRightPaneResize);

      /* Filters */
      document.getElementById('filterSearch').addEventListener('input', filterFolderList);
      document.getElementById('filterExt').addEventListener('change', function(){ drawVenn(); });
      document.getElementById('filterMinFiles').addEventListener('change', function(){ drawVenn(); });
      document.getElementById('metricsSource').addEventListener('change', renderMetricsPanel);
      document.getElementById('metricsPointDate').addEventListener('change', renderMetricsPanel);

      /* Resize */
      window.addEventListener('resize', function(){ drawVenn(); });
    }

    function toggleDetailPane(){
      var btn = document.getElementById('btnCollapseDetail');
      var collapsed = rightPaneEl.classList.toggle('collapsed');
      if(collapsed){
        rightResizerEl.classList.add('hidden');
        btn.textContent = 'Expand';
      } else {
        rightResizerEl.classList.remove('hidden');
        btn.textContent = 'Collapse';
        rightPaneEl.style.width = rightPaneWidth + 'px';
      }
      drawVenn();
    }

    function startRightPaneResize(e){
      if(rightPaneEl.classList.contains('collapsed')) return;
      isResizingRightPane = true;
      e.preventDefault();
    }

    function onRightPaneResize(e){
      if(!isResizingRightPane) return;
      var rect = mainEl.getBoundingClientRect();
      var desired = rect.right - e.clientX;
      var bounded = Math.max(220, Math.min(680, desired));
      rightPaneWidth = bounded;
      rightPaneEl.style.width = bounded + 'px';
      drawVenn();
    }

    function stopRightPaneResize(){
      isResizingRightPane = false;
    }

    function filterFolderList(){
      var q = document.getElementById('filterSearch').value.toLowerCase();
      var items = folderListEl.querySelectorAll('.folder-item');
      for(var i=0;i<items.length;i++){
        var name = (items[i].getAttribute('data-folder')||'').toLowerCase();
        var visible = (!q || name.indexOf(q) >= 0);
        items[i].style.display = visible ? '' : 'none';
        if(items[i].nextSibling && items[i].nextSibling.className === 'folder-meta'){
          items[i].nextSibling.style.display = visible ? '' : 'none';
        }
      }
    }

    function markSelectedInList(){
      var items = folderListEl.querySelectorAll('.folder-item');
      for(var i=0;i<items.length;i++){
        var n = items[i].getAttribute('data-folder');
        if(selectedFolders[n]) items[i].classList.add('selected');
        else items[i].classList.remove('selected');
      }
    }

    function showTooltip(e, folder){
      var extMap = {};
      for(var i=0;i<folder.files.length;i++) extMap[folder.files[i].ext]=(extMap[folder.files[i].ext]||0)+1;
      var html = '<h4>'+esc(folder.name)+'</h4>';
      html += '<div class="tt-row"><span class="tt-label">Files:</span><span class="tt-val">'+folder.files.length+'</span></div>';
      html += '<div class="tt-row"><span class="tt-label">Size:</span><span class="tt-val">'+formatBytes(folder.totalSize)+'</span></div>';
      html += '<div class="tt-row"><span class="tt-label">Last change:</span><span class="tt-val">'+esc(folder.latestChange || 'n/a')+'</span></div>';
      html += '<div class="tt-row"><span class="tt-label">Version issued:</span><span class="tt-val">'+esc(folder.latestVersionIssued || 'n/a')+'</span></div>';
      var exts = Object.keys(extMap).sort(function(a,b){return extMap[b]-extMap[a];});
      for(var j=0;j<exts.length && j<5;j++){
        html += '<div class="tt-row"><span class="tt-label">'+esc(exts[j])+'</span><span class="tt-val">'+extMap[exts[j]]+'</span></div>';
      }
      tooltipEl.innerHTML = html;
      tooltipEl.style.display = 'block';
      var r = document.getElementById('canvasWrap').getBoundingClientRect();
      tooltipEl.style.left = (e.clientX - r.left + 14) + 'px';
      tooltipEl.style.top = (e.clientY - r.top + 14) + 'px';
    }
    function hideTooltip(){ tooltipEl.style.display = 'none'; }
    function clearHover(){
      var circles = svg.querySelectorAll('circle');
      for(var i=0;i<circles.length;i++) circles[i].setAttribute('fill-opacity','0.18');
    }

    function exportSVG(){
      var serializer = new XMLSerializer();
      var src = serializer.serializeToString(svg);
      var blob = new Blob([src], {type:'image/svg+xml'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'PwShGUI-DependencyVenn.svg';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function updateStats(){
      var selCount = 0, totalFiles = 0, totalSize = 0;
      var latestChange = '';
      for(var i=0;i<DATA.folders.length;i++){
        if(selectedFolders[DATA.folders[i].name]){
          selCount++;
          totalFiles += DATA.folders[i].files.length;
          totalSize += DATA.folders[i].totalSize;
          latestChange = pickLatest(latestChange, DATA.folders[i].latestChange || '');
        }
      }
      document.getElementById('statFolders').textContent = 'Folders: ' + DATA.folders.length;
      document.getElementById('statFiles').textContent = 'Files: ' + totalFiles;
      document.getElementById('statSize').textContent = 'Total: ' + formatBytes(totalSize);
      document.getElementById('statSelected').textContent = 'Selected: ' + selCount + (latestChange ? ' | Last: ' + latestChange : '');
    }

    function loadMetricFiles(){
      DATA.metrics = [];
      metricRawFiles = {};
      for(var i=0;i<METRIC_FILES.length;i++){
        fetchMetricFile(METRIC_FILES[i]);
      }
    }

    function fetchMetricFile(path){
      var xhr = new XMLHttpRequest();
      xhr.open('GET', path, true);
      xhr.onload = function(){
        if(xhr.status === 200 || xhr.status === 0){
          metricRawFiles[path] = xhr.responseText || '';
          mergeMetrics(parseVersionMetrics(path, xhr.responseText || ''));
          if(path.indexOf('FILES-MANIFEST.md') >= 0){
            manifestVersion = extractManifestVersion(xhr.responseText || '');
          }
          syncHeaderAndManifestVersion();
          if(metricPanelVisible) renderMetricsPanel();
        }
      };
      xhr.send();
    }

    function parseVersionMetrics(source, text){
      var lines = text.split(/\r?\n/);
      var metrics = [];
      for(var i=0;i<lines.length;i++){
        var line = lines[i];
        var m = line.match(/(\d{4}\.B\d+\.V\d+\.\d+)/);
        if(!m) continue;
        var dateMatch = line.match(/(20\d{2}-\d{2}-\d{2}|20\d{6})/);
        var issued = '';
        if(dateMatch){
          issued = normalizeLooseDate(dateMatch[1]);
        }
        metrics.push({source:source, version:m[1], date:issued, line:(i+1), note:line.replace(/^\s*[-#*]+\s*/, '')});
      }
      return metrics;
    }

    function mergeMetrics(items){
      var seen = {};
      for(var i=0;i<DATA.metrics.length;i++){
        seen[DATA.metrics[i].source + '|' + DATA.metrics[i].version + '|' + DATA.metrics[i].line] = true;
      }
      for(var j=0;j<items.length;j++){
        var key = items[j].source + '|' + items[j].version + '|' + items[j].line;
        if(!seen[key]){
          DATA.metrics.push(items[j]);
          seen[key] = true;
        }
      }
      DATA.metrics.sort(function(a,b){
        var da = a.date || '0000-00-00';
        var db = b.date || '0000-00-00';
        if(da === db) return a.version < b.version ? 1 : -1;
        return da < db ? 1 : -1;
      });
    }

    function toggleMetricsMenu(){
      metricPanelVisible = !metricPanelVisible;
      metricsPanelEl.style.display = metricPanelVisible ? 'block' : 'none';
      if(metricPanelVisible) renderMetricsPanel();
    }

    function togglePinMetrics(){
      metricsPinned = !metricsPinned;
      var pinBtn = document.getElementById('btnPinMetrics');
      if(metricsPinned){
        metricsPanelEl.classList.add('pinned');
        mainEl.insertBefore(metricsPanelEl, rightResizerEl);
        metricPanelVisible = true;
        metricsPanelEl.style.display = 'block';
        pinBtn.textContent = 'Unpin Metrics';
      } else {
        metricsPanelEl.classList.remove('pinned');
        canvasWrapEl.appendChild(metricsPanelEl);
        metricsPanelEl.style.display = metricPanelVisible ? 'block' : 'none';
        pinBtn.textContent = 'Pin Metrics';
      }
      renderMetricsPanel();
      drawVenn();
    }

    function renderMetricsPanel(){
      var source = document.getElementById('metricsSource').value;
      var pointDate = document.getElementById('metricsPointDate').value;
      var active = [];
      for(var i=0;i<DATA.metrics.length;i++){
        var row = DATA.metrics[i];
        if(source !== 'auto' && source !== 'point' && row.source.indexOf(source) < 0) continue;
        if(source === 'point' && pointDate && row.date && row.date > pointDate) continue;
        active.push(row);
      }
      if(source === 'point' && !pointDate){
        active = [];
      }

      var latest = active.length ? active[0].version : CURRENT_VERSION;
      var oldest = active.length ? active[active.length-1].version : CURRENT_VERSION;

      var links = ''
        + '<a href="../../CHANGELOG.md" target="_blank" rel="noopener">CHANGELOG.md</a>'
        + ' | <a href="../../~README.md/CHANGELOG.md" target="_blank" rel="noopener">~README.md/CHANGELOG.md</a>'
        + ' | <a href="../../~README.md/FILES-MANIFEST.md" target="_blank" rel="noopener">~README.md/FILES-MANIFEST.md</a>';

      var html = '<h3>Metrics Menu</h3>'
        + '<div class="row"><span class="chip">Header: '+esc(CURRENT_VERSION)+'</span>'
        + '<span class="chip">Manifest: '+esc(manifestVersion || 'pending-load')+'</span>'
        + '<span class="chip">Metric points: '+active.length+'</span></div>'
        + '<div class="kpi">'
        + '<div><b>'+esc(latest)+'</b><span>Latest version</span></div>'
        + '<div><b>'+esc(oldest)+'</b><span>Oldest in view</span></div>'
        + '<div><b>'+DATA.folders.length+'</b><span>Recursive folders</span></div>'
        + '<div><b>'+DATA.files.length+'</b><span>Files indexed</span></div>'
        + '</div>'
        + '<div class="row">'+links+'</div>'
        + '<table><thead><tr><th>Date</th><th>Version</th><th>Source</th><th>Entry</th></tr></thead><tbody>';

      for(var j=0;j<active.length && j<25;j++){
        html += '<tr><td>'+esc(active[j].date || 'n/a')+'</td><td>'+esc(active[j].version)+'</td><td>'+esc(shortSource(active[j].source))+'</td><td>'+esc(trimText(active[j].note, 66))+'</td></tr>';
      }
      if(!active.length){
        html += '<tr><td colspan="4">No points match current source/date filter.</td></tr>';
      }
      html += '</tbody></table>';

      metricsPanelEl.innerHTML = html;
    }

    function syncHeaderAndManifestVersion(){
      var badge = document.getElementById('headerVersion');
      if(badge){
        var text = 'v' + CURRENT_VERSION;
        if(manifestVersion && manifestVersion !== CURRENT_VERSION){
          text += ' | manifest ' + manifestVersion;
        }
        badge.textContent = text;
      }
    }

    function extractManifestVersion(text){
      var m = text.match(/#\s*VersionTag:\s*(\d{4}\.B\d+\.V\d+\.\d+)/);
      return m ? m[1] : '';
    }

    /* ── helpers ── */
    function findFolder(name){
      for(var i=0;i<DATA.folders.length;i++){
        if(DATA.folders[i].name === name) return DATA.folders[i];
      }
      return null;
    }
    function formatBytes(b){
      if(b < 1024) return b + ' B';
      if(b < 1048576) return (b/1024).toFixed(1) + ' KB';
      return (b/1048576).toFixed(1) + ' MB';
    }
    function buildFolderChain(folder){
      var normalized = folder && folder !== '.' ? folder.replace(/^\/+|\/+$/g, '') : '(root)';
      if(!normalized || normalized === '(root)') return ['(root)'];
      var parts = normalized.split('/');
      var out = ['(root)'];
      for(var i=0;i<parts.length;i++){
        out.push(parts.slice(0, i+1).join('/'));
      }
      return out;
    }
    function ensureHintFolders(folderMap){
      for(var i=0;i<WORKSPACE_FOLDER_HINTS.length;i++){
        var hint = WORKSPACE_FOLDER_HINTS[i];
        if(!folderMap[hint]){
          folderMap[hint] = {name:hint, files:[], totalSize:0, latestChange:'', latestVersionIssued:'', depth:getDepth(hint)};
        }
      }
    }
    function indexFoldersByName(arr){
      var map = {};
      for(var i=0;i<arr.length;i++) map[arr[i].name] = arr[i];
      return map;
    }
    function getDepth(name){
      if(!name || name === '(root)') return 0;
      return name.split('/').length;
    }
    function pickLatest(a,b){
      if(!a) return b || '';
      if(!b) return a;
      return a > b ? a : b;
    }
    function toDateString(val){
      if(!val) return '';
      var d = new Date(val);
      if(isNaN(d.getTime())) return normalizeLooseDate(String(val));
      return d.toISOString().substring(0,10);
    }
    function normalizeLooseDate(s){
      if(!s) return '';
      if(/^20\d{2}-\d{2}-\d{2}$/.test(s)) return s;
      if(/^20\d{6}$/.test(s)) return s.substring(0,4) + '-' + s.substring(4,6) + '-' + s.substring(6,8);
      return '';
    }
    function shortSource(path){
      var p = path.replace('..\\/..\\/','');
      var bits = p.split('/');
      return bits.length > 2 ? bits.slice(bits.length-2).join('/') : p;
    }
    function isFolderFilteredIn(folder){
      var minFiles = parseInt(document.getElementById('filterMinFiles').value || '0', 10);
      var ext = document.getElementById('filterExt').value || '';
      if(folder.files.length < minFiles) return false;
      if(!ext) return true;
      for(var i=0;i<folder.files.length;i++){
        if(folder.files[i].ext === ext) return true;
      }
      return false;
    }
    function trimText(s,max){
      var val = String(s || '');
      return val.length > max ? val.substring(0,max-1) + '…' : val;
    }
    function randomPastDate(maxDays){
      var now = new Date().getTime();
      var offset = Math.floor(Math.random() * maxDays) * 86400000;
      return new Date(now - offset).toISOString().substring(0,10);
    }
    function esc(s){
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(s));
      return d.innerHTML;
    }

    /* ── boot ── */
