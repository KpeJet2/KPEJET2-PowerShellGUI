# Agent Creation Template
# Version: 1.0.0
# Standards Reference: FocalPoint-null Agent Standards v1.0
# Template maintained by: StandardsGuard-00
# Admin TO-DO for improvements: see todo/ directory

## USAGE
# Copy this template when creating a new sub-agent.
# All new agent requests must be submitted as Admin TO-DO items before creation.
# No agent is created without FocalPoint-null approval and Registry entry.

## MANDATORY FIELDS FOR EVERY AGENT

agent_id: "<AgentName>-XX"           # Increment XX from 00 (e.g., MyAgent-00)
display_name: "<Human Readable Name>"
role: "<ROLE>"                        # ORCHESTRATOR | SECURITY_PROXY | SECURITY | REVIEW | QUALITY | STANDARDS | SUBAGENT
description: "<Clear one-paragraph description of responsibilities and constraints>"
trust_level: "<TRUST_LEVEL>"          # ROOT | SANDBOX | SANDBOXED_SECURITY | REVIEW | QUALITY | STANDARDS | SUBAGENT

## CAPABILITIES (uncomment applicable)
capabilities:
  # - task_allocation
  # - role_control
  # - agent_review_brokering
  # - human_review_brokering
  # - organic_growth_evaluation
  # - fork_management
  # - checkpoint_resume
  # - inter_agent_brokering
  # - output_encoding
  # - sandbox_execution
  # - content_sanitization
  # - encoded_transform_delivery
  # - threat_detection
  # - vulnerability_assessment
  # - remediation_planning
  # - sandbox_simulation
  # - virtual_client_proxy_testing
  # - agent_performance_review
  # - regression_analysis
  # - role_suggestion
  # - interoperability_analysis
  # - conflict_detection
  # - code_quality_review
  # - refactoring
  # - standards_uplift
  # - dependency_analysis
  # - standards_management
  # - schema_updates
  # - template_management
  # - todo_management
  # - source_references

## CODE OPS RESTRICTION
allows_code_ops: false                # Set true ONLY for agents permitted to write/review/test code
min_version_loops: 1                  # Minimum completed orchestration loops before code ops allowed

## PKI
pki:
  cert_file: "pki/<agent_id>.pem"
  public_key_file: "pki/<agent_id>.pub"
  cert_status: "PENDING_GENERATION"

## INTER-AGENT ACCESS
inter_agent_access:
  all_communication_via_focalpoint: true
  can_initiate_to: []                  # List agent_ids this agent may send TO (empty = none, ALL = all)
  receives_from: ["FocalPoint-null-*"]

## SYSTEM PROMPT STANDARDS
# - Must include explicit constraints on what the agent CANNOT do
# - Must specify structured JSON output format
# - Must reference this config for allowed operations
# - Must not permit code execution, file system writes, or network access outside defined scope

## REVIEW REQUIREMENTS
# Before activation, the following must be completed:
# 1. Agent SR-ID assigned in agent_registry.json
# 2. PKI keypair generated
# 3. System prompt reviewed and approved by FocalPoint-null-00
# 4. At least one test task processed through full orchestration loop
# 5. AgentReview-00 performance review completed
# 6. All results archived with appropriate ALLOW-AGENT-ARCHIVAL-ACCESS tags

## STANDARDS SOURCE REFERENCES
# - Microsoft Agent Framework: https://github.com/microsoft/agent-framework
# - PKI: RFC 5280 (X.509 Certificates), NIST SP 800-57 (Key Management)
# - Logging: Structured logging (structlog), OWASP Logging Cheat Sheet
# - Security: OWASP Top 10 for LLM Applications







